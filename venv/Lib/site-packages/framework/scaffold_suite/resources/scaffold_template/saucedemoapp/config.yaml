# Browser settings
browser: chromium
headless: true

reporting:
  # Enable and configure reporting plugins.
  # Plugin-specific configurations should be in separate config files
  # under apps/saucedemo/configs/plugins/<PluginName>/config.yml
  # or provided via environment variables as configured in those plugin config files.
  - name: HtmlReportPlugin
    enabled: false
    # config: {} # No inline config needed
  - name: AllurePlugin
    enabled: true
    config: {
      allure_dir: "allure-results"
    }
  - name: XrayPlugin
    enabled: true
    config: {
      XRAY_CLIENT_ID: "${XRAY_CLIENT_ID}",
      XRAY_CLIENT_SECRET: "${XRAY_CLIENT_SECRET}",
      XRAY_API_BASE_URL: "${XRAY_API_BASE_URL}",
      XRAY_PROJECT_KEY: "${XRAY_PROJECT_KEY}",
    }
