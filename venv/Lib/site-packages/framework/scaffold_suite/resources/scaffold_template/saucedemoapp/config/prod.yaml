environment: prod
instance_url: https://login.saucedemo.com
login_url: https://login.saucedemo.com/
timeout_ms: 60000
wait_for_element_timeout: 10000

# Browser settings
browser: chromium
headless: true
slow_motion_ms: 0

# Test user credentials
# Test user credentials
username: ${SAUCEDEMO_USERNAME}
password: ${SAUCEDEMO_PASSWORD}

# Retry settings
max_retry_attempts: 5
retry_wait_ms: 1000

# Application settings
app_launcher_timeout: 10000
page_load_timeout: 60000

# Optional: Proxy settings
proxy:
  enabled: false
  url: null

default_workers: auto
default_dist_scope: "loadscope"
 
report:
  unified_report_path: apps/saucedemoapp/reports//test_results.html   # unified report output
  batch_report_folder: apps/saucedemoapp/reports//batch_reports  # folder to save individual test results
 
folders:
  batch1:
      workers: "auto"
      dist_scope: "loadfile"
      testfiles:
        - "apps/saucedemoapp/regression/tests/tests_ui"
        - "apps/saucedemoapp/regression/tests/tests_api"
  batch2:
      workers: "auto"
      dist_scope: "loadfile"
      testfiles:
        - "apps/saucedemoapp/regression/tests/tests_db"


custom_parallel_run:
  enabled: false
  batches:
    full_run:
      workers: "auto"
      dist_scope: "loadfile"
      testfiles:
        - "apps/saucedemoapp/regression/tests/tests_ui"
        - "apps/saucedemoapp/regression/tests/tests_api"

    batch2:
      workers: "auto"
      dist_scope: "loadfile"
      testfiles:
        - "apps/saucedemoapp/regression/tests/tests_db"


  
reporting:
  # Enable and configure reporting plugins.
  # Plugin-specific configurations should be in separate config files
  # under apps/saucedemo/configs/plugins/<PluginName>/config.yml
  # or provided via environment variables as configured in those plugin config files.
  - name: HtmlReportPlugin
    enabled: true
    # config: {} # No inline config needed
  - name: AllurePlugin
    enabled: true
    config: {
      allure_dir: "allure-results"
    }
  - name: XrayPlugin
    enabled: true
    config: {
      XRAY_CLIENT_ID: "${XRAY_CLIENT_ID}",
      XRAY_CLIENT_SECRET: "${XRAY_CLIENT_SECRET}",
      XRAY_API_BASE_URL: "${XRAY_API_BASE_URL}",
      XRAY_PROJECT_KEY: "${XRAY_PROJECT_KEY}",
    }

    # jira:
    # enabled: true
    # url: https://your-domain.atlassian.net
    # email: your-email@company.com
    # api_token: YOUR_API_TOKEN
    # project_key: QA
    # issue_type: Bug
    # attach_logs: true
    # attach_screenshots: true