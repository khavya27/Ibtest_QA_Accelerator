environment: qa
instance_url: https://test.saucedemo.com
login_url: https://test.saucedemo.com/
timeout_ms: 30000
wait_for_element_timeout: 5000

# Browser settings
browser: chromium
headless: true
slow_motion_ms: 0

# Test user credentials (use environment variables in production)
username: ${SF_USERNAME}
password: ${SF_PASSWORD}

# Retry settings
max_retry_attempts: 3
retry_wait_ms: 500

# Application settings
app_launcher_timeout: 5000
page_load_timeout: 30000

# Optional: Proxy settings
proxy:
  enabled: false
  url: null

default_workers: auto
default_dist_scope: "loadscope"
 
report:
  unified_report_path: apps/saucedemo/reports//test_results.html   # unified report output
  batch_report_folder: apps/saucedemo/reports//batch_reports  # folder to save individual test results
 
folders:
  batch1:
      workers: "auto"
      dist_scope: "loadfile"
      testfiles:
        - "apps/saucedemo/regression/tests/tests_ui"
        - "apps/saucedemo/regression/tests//tests_api"
  batch2:
      workers: "auto"
      dist_scope: "loadfile"
      testfiles:
        - "apps/saucedemo/regression/tests/tests_db"