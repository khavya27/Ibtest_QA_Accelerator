[tool.black]
line-length = 120
target-version = ['py312']
include = '\.pyi?$'
extend-exclude = '''
/(
    \.git
  | \.hg
  | \.mypy_cache
  | \.venv
  | __pycache__
  | .pytest_cache
  | .coverage
  | htmlcov
  | \.github
  | \.dvenv
)/
'''

[tool.isort]
profile = "black"
line_length = 120
multi_line_output = 3
include_trailing_comma = true
use_parentheses = true
ensure_newline_before_comments = true
known_first_party = ["apps", "framework"]
known_third_party = ["pytest", "playwright"]
sections = ["FUTURE", "STDLIB", "THIRDPARTY", "FIRSTPARTY", "LOCALFOLDER"]
extend_skip = ["runner.py"]


[tool.bandit]
targets = ["apps", "framework"]
exclude_dirs = [
  ".venv",
  ".pytest_cache",
  "__pycache__",
  "node_modules",
]
skips = [
  "B101" # assert_used
]

[tool.pytest.ini_options]
# Test discovery
testpaths = ["apps"]
python_files = ["test_*.py", "*_test.py"]
python_classes = ["Test*", "test*"]
python_functions = ["test_*"]

# Addopts: reporting + rootdir + import mode
addopts = """
  -v -s
  --junitxml=test-results.xml
  --tb=short
  --json-report
  --html=report.html
  --self-contained-html
  --import-mode=importlib
  --no-header
"""

# JUnit report
junit_family = "xunit2"
junit_logging = "all"

# Custom markers
markers = [
  "xray: mark tests for Xray integration",
  "smoke: mark tests for smoke suite",
  "regression: mark tests for regression suite",
  "sanity: mark tests for sanity suite",
  "critical: mark tests for critical path",
  "ui_validation: mark tests for UI validation",
  "api: mark tests for API validation",
  "stable: mark tests for stable suite",
  "slow: mark tests for slow suite"
]

[tool.pylint.main]
ignore = [
  "__pycache__",
  ".venv",
  "build",
  "dist"
]
jobs = 1
score = true 
fail-under = 9
init-hook = 'import sys; sys.path.append(".")'

[tool.pylint.messages_control]
disable = [
"C0114", # missing-module-docstring
  "C0115", # missing-class-docstring
  "C0116", # missing-function-docstring
  "C0303", # trailing-whitespace
  "C0304", # missing-final-newline
  "C0103", # invalid-name (style-only, common in reports/libs)
  "C0411", # wrong-import-order
  "C0413", # wrong-import-position
  "C0415", # import-outside-toplevel
  "W0404", # reimported
  "R0903", # too-few-public-methods
  "R0917", # too-many-positional-arguments
  "R1721", # unnecessary-comprehension
  "R1723", # no-else-break
  "R1735", # consider-using-dict-comprehension
  "W0201", # attribute-defined-outside-init
  "W0212", # protected-access
  "W0611", # unused-import
  "W0613", # unused-argument
  "W0621", # redefined-outer-name
  "W1203", # logging-fstring-interpolation
  "W1514", # unspecified-encoding
]

[tool.pylint.reports]
output-format = "colorized"
score = true

[tool.pylint.format]
max-line-length = 120
indent-string = "    "
good-names = ["i", "j", "k", "ex", "Run", "_", "db", "df", "ok", "f", "e"]

[tool.pylint.basic]
function-rgx = "(test_[a-zA-Z0-9_]+|[a-z_][a-z0-9_]{2,40})$"

[tool.pylint.design]
max-args = 8
max-attributes = 15
max-locals = 25
max-branches = 15
max-statements = 80

[tool.pylint.typecheck]
generated-members = ["pytest.*", "request.*", "browser.*", "page.*"]

[tool.mypy]
python_version = "3.12"

# ---- Core correctness ----
explicit_package_bases = true
no_implicit_optional = true
strict_optional = true
strict_equality = true

# ---- Type coverage ----
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true

# Decorators are common in pytest / frameworks
disallow_untyped_decorators = false

# ---- Warnings / hygiene ----
warn_unused_configs = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true

# Optional
warn_return_any = false
warn_no_return = false

# Disable specific error codes
disable_error_code = [
  "import-untyped",     # Third-party libs without stubs
  "misc",               # Untyped decorators cascading errors
  "no-untyped-call",    # Pytest fixtures / dynamic hooks
  "no-untyped-def",     # Missing annotations (coverage, not correctness)
  "no-any-return",      # Returning Any (design smell, not runtime bug)
  "type-arg",           # Generic verbosity in tests
  "arg-type",           # Dynamic objects / fixtures
  "func-returns-value"  # Helpers returning None intentionally
]

# ---- Overrides for tests + dynamically typed utility scripts ----
[[tool.mypy.overrides]]
module = ["framework.*"]
disallow_untyped_defs = true
check_untyped_defs = true
warn_return_any = true
warn_no_return = true

[[tool.mypy.overrides]]
module = ["apps.*"]
disallow_untyped_defs = false
check_untyped_defs = false
warn_return_any = false
warn_no_return = false